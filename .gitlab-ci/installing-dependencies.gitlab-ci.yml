build-container-with-dependencies:
  stage: installing-dependencies
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build --target dependency-installation-stage -t $CI_REGISTRY_IMAGE:dependencies-latest .
    - docker push $CI_REGISTRY_IMAGE:dependencies-latest
  only:
    changes:
      - package.json
    refs:
      - dev
      - main
      - tags
  tags:
    - runner-server-01-shell
  when: always